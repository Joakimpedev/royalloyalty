# Royal Loyalty — Shopify app configuration.
# Scopes per ROYAL-LOYALTY-DEVELOPMENT.md Phase 0. Each maps to a real GraphQL
# call (see SCOPE-JUSTIFICATIONS.md). API version pinned 2026-01 — must match
# shopify.server.ts and .graphqlrc.ts. client_id set by `shopify app config link`.
client_id = ""
name = "Royal Loyalty"
application_url = ""
embedded = true

# App Proxy — required so the Theme App Extension widget and POS extension can
# reach the server (member balance, redeem, POS earn/redeem). Reconciles DEC-02:
# the dev plan deferred App Proxy, but the storefront/POS surfaces cannot
# function without a server endpoint. Requests to {shop}/apps/royal/* are
# forwarded to {application_url}/proxy/* and validated via the proxy HMAC
# signature in app/routes/proxy.$.tsx (authenticate.public.appProxy).
[app_proxy]
url = ""
prefix = "apps"
subpath = "royal"

[access_scopes]
# Minimal set. High-scrutiny (justified in SCOPE-JUSTIFICATIONS.md):
#   write_customers (tag-only), read_orders (compute points; 60-day window),
#   write_store_credit_account_transactions (cashback + store-credit reward).
scopes = "read_customers,write_customers,read_orders,write_discounts,read_products,read_store_credit_account_transactions,write_store_credit_account_transactions"

[webhooks]
api_version = "2026-01"

  # Operational
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = ["orders/create"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/cancelled"
  topics = ["orders/cancelled"]

  # refunds/create is the valid refund topic — orders/refunded does NOT exist;
  # orders/updated does not reliably carry the refunds array. (audit-corrected)
  [[webhooks.subscriptions]]
  uri = "/webhooks/refunds/create"
  topics = ["refunds/create"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app_subscriptions/update"
  topics = ["app_subscriptions/update"]

  # Mandatory GDPR compliance topics (real logic implemented Phase 6)
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = ["customers/data_request"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = ["customers/redact"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = ["shop/redact"]
