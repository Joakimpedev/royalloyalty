# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "3debefc84d62918dea2b47d136d66044"
name = "Royal Loyalty"
application_url = "https://royalloyalty-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

# API version pinned to 2026-01 — must match ApiVersion.January26 in
# app/shopify.server.ts and .graphqlrc.ts (GraphQL queries are validated
# against the Jan-26 schema). Do not bump without re-validating queries.
[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "customers/create" ]
  uri = "/webhooks/customers/create"

  [[webhooks.subscriptions]]
  topics = [ "customers/update" ]
  uri = "/webhooks/customers/update"

  [[webhooks.subscriptions]]
  topics = [ "orders/cancelled" ]
  uri = "/webhooks/orders/cancelled"

  [[webhooks.subscriptions]]
  topics = [ "refunds/create" ]
  uri = "/webhooks/refunds/create"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Minimal justified set (see SCOPE-JUSTIFICATIONS.md). config link wiped this
# because the new Partner app had no scopes yet — restored to match the code.
scopes = "read_customers,write_customers,read_orders,write_discounts,read_products,read_store_credit_account_transactions,write_store_credit_account_transactions,read_themes"

[auth]
redirect_urls = [ "https://royalloyalty-production.up.railway.app/api/auth" ]

# App Proxy: storefront/POS surfaces hit {shop}/apps/royal/* which Shopify
# forwards to {url}/proxy/* (handled by app/routes/proxy.$.tsx, HMAC-validated).
# NOTE: unlike application_url, this is NOT auto-updated by `shopify app dev` —
# it must be set to the dev tunnel URL for local testing and to the Railway
# production URL for deploy.
[app_proxy]
url = "https://royalloyalty-production.up.railway.app"
subpath = "royal"
prefix = "apps"
