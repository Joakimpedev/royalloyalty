# Royal Loyalty — POS UI extension (Phase 4, brief §3a.8).
# Earn + redeem in-store and balance lookup by customer. The extension calls
# the app's App Proxy endpoints (server-side validated). Minimal UI surface:
# a Smart Grid tile -> a modal with balance lookup, earn, and redeem.
api_version = "2026-01"

[[extensions]]
name = "Royal Loyalty POS"
handle = "loyalty-pos"

uid = "1e1dd294-1019-d41a-b07f-d4b4aaff9d7d259dbd44"

type = "ui_extension"

  [[extensions.targeting]]
  target = "pos.home.tile.render"
  module = "./src/Tile.jsx"

  [[extensions.targeting]]
  target = "pos.home.modal.render"
  module = "./src/Modal.jsx"
